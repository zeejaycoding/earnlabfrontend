<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="#23292F"/>
  
  <!-- XRP Blue circle -->
  <circle cx="100" cy="100" r="95" fill="#00AAE4"/>
  
  <!-- X symbol -->
  <g fill="white">
    <!-- Top left to bottom right -->
    <rect x="70" y="50" width="20" height="100" rx="10" transform="rotate(45 80 100)"/>
    <!-- Top right to bottom left -->
    <rect x="110" y="50" width="20" height="100" rx="10" transform="rotate(-45 120 100)"/>
  </g>
</svg>
