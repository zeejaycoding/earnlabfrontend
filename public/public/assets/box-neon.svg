<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0099FF;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer glow -->
  <rect x="25" y="35" width="150" height="130" rx="15" fill="none" stroke="#00D4FF" stroke-width="2" opacity="0.3"/>
  
  <!-- Main box -->
  <rect x="35" y="45" width="130" height="110" rx="12" fill="url(#neonGradient)" filter="url(#glow)"/>
  
  <!-- Inner details -->
  <rect x="45" y="55" width="110" height="30" rx="6" fill="white" opacity="0.15"/>
  
  <!-- Corner accents -->
  <circle cx="50" cy="50" r="4" fill="#00D4FF" opacity="0.8"/>
  <circle cx="150" cy="50" r="4" fill="#00D4FF" opacity="0.8"/>
  <circle cx="50" cy="150" r="4" fill="#00D4FF" opacity="0.8"/>
  <circle cx="150" cy="150" r="4" fill="#00D4FF" opacity="0.8"/>
  
  <!-- Center star -->
  <g transform="translate(100, 95)">
    <polygon points="0,-8 2,-2 8,-2 3,2 5,8 0,4 -5,8 -3,2 -8,-2 -2,-2" fill="#00D4FF" opacity="0.9"/>
  </g>
</svg>
